name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm --filter @eekodigital/raster test:coverage
      - run: cd docs && pnpm build
      - run: cd docs && pnpm exec playwright install --with-deps chromium
      - run: cd docs && pnpm test:e2e
